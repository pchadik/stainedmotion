/* ===== src/core/canvas.js ===== */
// Full-screen canvas bootstrap shared by every mode.
(function (App) {
  App.createCanvas = function (opts) {
    opts = opts || {};
    var canvas = document.createElement('canvas');
    var s = canvas.style;
    s.position = 'fixed';
    s.top = '0';
    s.left = '0';
    s.width = '100%';
    s.height = '100%';
    s.background = opts.background || '#0a0a0a';
    s.cursor = 'none';

    var mount = opts.mount ? document.querySelector(opts.mount) : null;
    (mount || document.body).appendChild(canvas);

    var ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    return {
      canvas: canvas,
      ctx: ctx,
      get width() { return canvas.width; },
      get height() { return canvas.height; },
      setBackground: function (c) { s.background = c; },
      destroy: function () {
        window.removeEventListener('resize', resize);
        if (canvas.parentNode) canvas.parentNode.removeChild(canvas);
      }
    };
  };
})(window.App = window.App || {});

/* ===== src/core/loop.js ===== */
// requestAnimationFrame loop with start/stop. Passes (dt, time) in ms.
(function (App) {
  App.createLoop = function (fn) {
    var raf = null;
    var last = 0;
    var running = false;

    function frame(t) {
      if (!running) return;
      var dt = last ? t - last : 16.7;
      last = t;
      fn(dt, t);
      raf = requestAnimationFrame(frame);
    }

    return {
      start: function () {
        if (running) return;
        running = true;
        last = 0;
        raf = requestAnimationFrame(frame);
      },
      stop: function () {
        running = false;
        if (raf) cancelAnimationFrame(raf);
      }
    };
  };
})(window.App = window.App || {});

/* ===== src/core/weprops.js ===== */
// Wallpaper Engine user-property plumbing, with sane fallbacks when run
// outside WE (e.g. the GitHub Pages demo, where the listener never fires).
(function (App) {
  // WE sends colors as space-separated floats in 0..1, e.g. "0.04 0.04 0.04".
  function weColorToCss(v) {
    var parts = String(v).split(' ').map(parseFloat);
    if (parts.length < 3 || parts.some(isNaN)) return null;
    return 'rgb(' + Math.round(parts[0] * 255) + ',' +
                    Math.round(parts[1] * 255) + ',' +
                    Math.round(parts[2] * 255) + ')';
  }

  App.createSettings = function (defaults, onChange) {
    var settings = Object.assign({}, defaults);

    window.wallpaperPropertyListener = {
      applyUserProperties: function (props) {
        if (props.schemecolor && props.schemecolor.value != null) {
          var css = weColorToCss(props.schemecolor.value);
          if (css) settings.background = css;
        }
        if (onChange) onChange(settings);
      }
    };

    return settings;
  };
})(window.App = window.App || {});

/* ===== src/core/paint.js ===== */
// Low-level drawing helpers shared by the renderers.
(function (App) {
  App.clear = function (ctx, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(0, 0, w, h);
  };

  function tracePath(ctx, pts) {
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (var i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
  }

  App.fillPolygon = function (ctx, pts, fillStyle) {
    ctx.fillStyle = fillStyle;
    tracePath(ctx, pts);
    ctx.fill();
  };

  // Cloisonné-style outline around a closed polygon.
  App.strokePolygon = function (ctx, pts, strokeStyle, width) {
    ctx.strokeStyle = strokeStyle;
    ctx.lineWidth = width;
    ctx.lineJoin = 'round';
    tracePath(ctx, pts);
    ctx.stroke();
  };

  // Open polyline (rays, spirals).
  App.strokePolyline = function (ctx, pts, strokeStyle, width) {
    ctx.strokeStyle = strokeStyle;
    ctx.lineWidth = width;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (var i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
  };

  App.fillCircle = function (ctx, cx, cy, r, style) {
    ctx.fillStyle = style;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
  };
})(window.App = window.App || {});

/* ===== src/core/color.js ===== */
// Harmonic color engine: a slowly drifting root hue, harmony palettes that
// cross-fade when they switch, and smooth (non-quantized) hue interpolation so
// cells never flip abruptly. Driven entirely by a palette config so each mode
// can supply its own harmonies and saturation/lightness ranges.
(function (App) {
  App.createColorEngine = function (palette) {
    var p = palette;
    var harmonyNames = Object.keys(p.harmonies);

    // Optional themed band (e.g. earthy modes): keep the drifting root hue
    // within [hueRange.min, hueRange.max] by ping-ponging rather than cycling
    // the whole wheel. Omit hueRange for the original full-spectrum drift.
    var rootHue = p.hueRange
      ? p.hueRange.min + Math.random() * (p.hueRange.max - p.hueRange.min)
      : Math.random() * 360;
    var hueDir = 1;
    var harmonyType = 0;
    var prevHarmony = 0;
    var harmonyMix = 1; // 1 = fully on current harmony, <1 = mid cross-fade

    // Interpolate between two hues along the shortest angular path.
    function lerpHue(a, b, t) {
      var d = ((b - a + 540) % 360) - 180;
      return (a + d * t + 360) % 360;
    }

    function harmonicHueFor(harmony, cx, cy, w, h) {
      var blend = (Math.sin(cx / w * Math.PI * p.blendFreqX) +
                   Math.sin(cy / h * Math.PI * p.blendFreqY)) / 2;
      // Continuous position within the palette (no hard quantization step).
      var pos = (blend + 1) / 2 * harmony.length;
      var i0 = Math.floor(pos) % harmony.length;
      var i1 = (i0 + 1) % harmony.length;
      var frac = pos - Math.floor(pos);
      var h0 = (rootHue + harmony[i0] + 360) % 360;
      var h1 = (rootHue + harmony[i1] + 360) % 360;
      return lerpHue(h0, h1, frac);
    }

    function getHarmonicHue(cx, cy, w, h) {
      var toHue = harmonicHueFor(p.harmonies[harmonyNames[harmonyType]], cx, cy, w, h);
      if (harmonyMix >= 1) return toHue;
      // Cross-fade from the previous harmony so a switch sweeps in smoothly.
      var fromHue = harmonicHueFor(p.harmonies[harmonyNames[prevHarmony]], cx, cy, w, h);
      return lerpHue(fromHue, toHue, harmonyMix);
    }

    function hueToColor(hue, cx, cy, w, h) {
      var sVal = Math.sin(cx / w * Math.PI * p.satFreqX + cy / h * Math.PI * p.satFreqY);
      var lVal = Math.sin(cx / w * Math.PI * p.lightFreqX + cy / h * Math.PI * p.lightFreqY);
      return { h: hue, s: p.satBase + sVal * p.satAmp, l: p.lightBase + lVal * p.lightAmp };
    }

    function colorToHsl(c) {
      return 'hsl(' + c.h + ', ' + c.s + '%, ' + c.l + '%)';
    }

    function getCellColor(cx, cy, w, h) {
      var x = Math.max(0, Math.min(w, cx));
      var y = Math.max(0, Math.min(h, cy));
      return hueToColor(getHarmonicHue(x, y, w, h), x, y, w, h);
    }

    // Advance the slow hue drift and any in-progress harmony cross-fade.
    function tick() {
      if (p.hueRange) {
        rootHue += p.hueDrift * hueDir;
        if (rootHue >= p.hueRange.max) { rootHue = p.hueRange.max; hueDir = -1; }
        else if (rootHue <= p.hueRange.min) { rootHue = p.hueRange.min; hueDir = 1; }
      } else {
        rootHue = (rootHue + p.hueDrift) % 360;
      }
      if (harmonyMix < 1) {
        harmonyMix = Math.min(1, harmonyMix + p.crossfadeStep);
      } else if (Math.random() < p.harmonySwitchProb) {
        prevHarmony = harmonyType;
        harmonyType = (harmonyType + 1) % harmonyNames.length;
        harmonyMix = 0;
      }
    }

    return {
      getCellColor: getCellColor,
      colorToHsl: colorToHsl,
      tick: tick
    };
  };
})(window.App = window.App || {});

/* ===== src/core/motion.js ===== */
// Three independent motion axes, each a value in [0,1] that drifts on its own
// incommensurate cycle so the scene keeps recomposing instead of looping:
//   u - undulation (flow-field breathing)
//   r - rotation   (roundels / polar mosaic spin)
//   p - particles  (motes advecting along the streamlines)
// A soft floor on combined energy keeps it from ever going fully still.
// Master intensity and per-axis enable/cap hooks back the future WE properties.
(function (App) {
  App.createMotion = function (config) {
    config = config || {};
    var intensity = config.intensity != null ? config.intensity : 1;
    var enabled = Object.assign({ u: true, r: true, p: true }, config.enabled);
    var cap = Object.assign({ u: 1, r: 1, p: 1 }, config.cap);
    var minEnergy = config.minEnergy != null ? config.minEnergy : 0.6;

    // Each axis blends two sine components at incommensurate periods (seconds).
    // Randomized phase offsets make every run start differently.
    function axis(p1, p2) {
      return {
        w1: 2 * Math.PI / p1,
        w2: 2 * Math.PI / p2,
        o1: Math.random() * Math.PI * 2,
        o2: Math.random() * Math.PI * 2
      };
    }
    var defs = {
      u: axis(41, 17),
      r: axis(53, 23),
      p: axis(67, 29)
    };

    // Amplitudes 0.7 + 0.3 keep the result within [0,1].
    function raw(a, ts) {
      return 0.5 + 0.5 * (0.7 * Math.sin(a.w1 * ts + a.o1) + 0.3 * Math.sin(a.w2 * ts + a.o2));
    }

    var values = { u: 0, r: 0, p: 0 };

    function sample(timeMs) {
      var ts = timeMs / 1000;
      var u = raw(defs.u, ts);
      var r = raw(defs.r, ts);
      var p = raw(defs.p, ts);

      // Soft floor on combined energy so the scene never flatlines.
      var energy = u + r + p;
      if (energy < minEnergy) {
        var lift = (minEnergy - energy) / 3;
        u = Math.min(1, u + lift);
        r = Math.min(1, r + lift);
        p = Math.min(1, p + lift);
      }

      // Per-axis enable/cap and master intensity (a user override that can
      // suppress motion entirely, applied after the natural floor).
      values.u = (enabled.u ? cap.u : 0) * intensity * u;
      values.r = (enabled.r ? cap.r : 0) * intensity * r;
      values.p = (enabled.p ? cap.p : 0) * intensity * p;
      return values;
    }

    return {
      sample: sample,
      values: values,
      setIntensity: function (v) { intensity = v; },
      setEnabled: function (axisKey, on) { enabled[axisKey] = on; },
      setCap: function (axisKey, v) { cap[axisKey] = v; }
    };
  };
})(window.App = window.App || {});

/* ===== src/palettes/heartwood.js ===== */
// Heartwood palette: earthy harmonic color — forest greens reaching into olive,
// moss, gold, amber and umber. Unlike the Art Nouveau palette (which keeps the
// full hue wheel), this one constrains the drifting root hue to an earth band
// via `hueRange`, so the scene stays in greens/golds/browns while still moving.
// Lower lightness than the Art Nouveau modes for a deep, woodland feel.
(function (App) {
  App.palettes = App.palettes || {};
  App.palettes.heartwood = {
    harmonies: {
      // All offsets kept small so root-hue + offset never leaves the earth band.
      forest:    [0, -15, 12, -28],   // green core, olive + gold neighbours
      mossGold:  [0, -25, -40, 14],   // green -> amber -> sienna
      barkUmber: [0, 18, -30, 8]      // green <-> umber/brown
    },
    satBase: 34, satAmp: 12,
    lightBase: 40, lightAmp: 12,
    blendFreqX: 1.2, blendFreqY: 1.8,
    satFreqX: 1.0, satFreqY: 0.7,
    lightFreqX: 0.8, lightFreqY: 1.2,
    hueDrift: 0.003,
    harmonySwitchProb: 0.00003,
    crossfadeStep: 0.006,
    // Keep the root hue ping-ponging in the yellow-green..green range; the small
    // harmony offsets above carry it down into amber/umber without leaving earth.
    hueRange: { min: 65, max: 115 },
    // Earthy bronze contour — the nouveau cloisonné line, woodland-tinted.
    outline: '#8a7a45',
    outlineWidth: 1.4
  };
})(window.App = window.App || {});

/* ===== src/modes/heartwood.js ===== */
// Heartwood mode — public name "Heartwood". A surreal Art Nouveau forest.
//
// Two wavy ribbons descend from a shared point high on the canvas: near each
// other at the top and splaying wide at the bottom — at once a PATH converging
// to a far destination and two great TRUNKS. They breathe and sway in sync.
// Behind them a field of restless vertical "trees" dances. Earthy harmonic
// color throughout (greens, golds, umbers).
//
// Layers, back to front:
//   ground      - flat dark backdrop (env.background)
//   forest      - swaying vertical tree-lines, faded by depth
//   apex glow   - soft warm breathing light at the shared convergence point
//   ribbons     - the two converging trunks/paths: segmented earthy-green fill
//                 with a nouveau contour; breathe + sway in sync
//   (future overlays: canopy at the top, root flare + leaf litter at the bottom)
(function (App) {
  App.createHeartwood = function (deps) {
    var color = deps.color;
    var motion = deps.motion;
    var palette = deps.palette || {};
    var outline = palette.outline || '#8a7a45';
    var outlineWidth = palette.outlineWidth || 1.4;

    var GLOBAL_SPEED = 0.7; // uniform slow-down of the whole piece

    var W = 1, H = 1, minDim = 1, builtW = 0, builtH = 0;
    var animTime = 0, wavePhase = 0, breath = 0;

    // Breathing: two incommensurate sines so the rhythm never quite repeats.
    // Both ribbons read this same value, so they move in sympathy.
    var BO1 = Math.random() * Math.PI * 2, BO2 = Math.random() * Math.PI * 2;
    function breathAt(ts) {
      return 0.62 * Math.sin(ts * (2 * Math.PI / 11) + BO1) +
             0.38 * Math.sin(ts * (2 * Math.PI / 6.5) + BO2);
    }

    // ---- forest of vertical tree-lines ----
    var trees = [];
    function buildTrees(w, h) {
      trees = [];
      var spacing = minDim * 0.024;
      var n = Math.max(24, Math.round(w / spacing));
      for (var i = 0; i < n; i++) {
        var z = Math.random();                            // depth: 0 far, 1 near
        var baseX = (i + 0.5) / n * w + (Math.random() - 0.5) * spacing * 0.9;
        trees.push({
          x: baseX,
          z: z,
          lean: (Math.random() - 0.5) * minDim * 0.03,    // static lean over height
          wob: (Math.random() - 0.5) * minDim * 0.024,    // static mid-height waviness
          wobF: 1.0 + Math.random() * 1.5,
          amp: minDim * (0.004 + 0.013 * z),              // dance amplitude (near sways more)
          spd: (2 * Math.PI) / (4 + Math.random() * 6),   // dance speed
          phase: Math.random() * Math.PI * 2,
          width: 0.8 + 2.6 * z,
          hueJ: (Math.random() - 0.5) * 16,
          seedY: Math.random()
        });
      }
    }

    var TREE_SEGS = 14;
    var FRONT_Z = 0.62; // trees nearer than this are foreground (drawn over the ribbons)

    function treePoints(tr, w, h, t) {
      var dance = Math.sin(t * tr.spd + tr.phase);
      var pts = [];
      for (var s = 0; s <= TREE_SEGS; s++) {
        var yN = s / TREE_SEGS;                          // 0 top, 1 bottom
        var y = -h * 0.06 + yN * (h * 1.12);
        var crown = Math.pow(1 - yN, 1.2);               // tops sway more, roots anchored
        var statics = tr.lean * (1 - yN) + tr.wob * Math.sin(yN * Math.PI * tr.wobF);
        var x = tr.x + statics + tr.amp * dance * (0.25 + 0.85 * crown);
        pts.push({ x: x, y: y });
      }
      return pts;
    }

    // Draw the part of one tree segment that lies OUTSIDE the ribbon corridor, so
    // no vertical line shows between the two wavy lines. When the segment crosses
    // an edge of the corridor, bisect to clip cleanly at the boundary.
    function drawTreeSeg(ctx, a, b, style, width, ax, ay, w, h) {
      var ai = inCorridor(a.x, a.y, ax, ay, w, h);
      var bi = inCorridor(b.x, b.y, ax, ay, w, h);
      if (ai && bi) return;
      if (!ai && !bi) { App.strokePolyline(ctx, [a, b], style, width); return; }
      var inP = ai ? a : b, outP = ai ? b : a;
      for (var k = 0; k < 14; k++) {
        var mx = (inP.x + outP.x) * 0.5, my = (inP.y + outP.y) * 0.5;
        if (inCorridor(mx, my, ax, ay, w, h)) { inP = { x: mx, y: my }; }
        else { outP = { x: mx, y: my }; }
      }
      App.strokePolyline(ctx, [outP, ai ? b : a], style, width);
    }

    // Back layer: the far trees, drawn behind the ribbons as a faded backdrop.
    function drawTreesBack(ctx, w, h, t, ax, ay) {
      for (var i = 0; i < trees.length; i++) {
        var tr = trees[i];
        if (tr.z > FRONT_Z) continue;
        var pts = treePoints(tr, w, h, t);
        var midY = h * (0.3 + tr.seedY * 0.4);
        var c = color.getCellColor(tr.x, midY, w, h);
        var l = Math.min(44, c.l * (0.45 + 0.28 * tr.z)); // capped so none read near-white
        var alpha = 0.22 + 0.30 * tr.z;
        var style = 'hsla(' + (c.h + tr.hueJ) + ', ' + Math.min(52, c.s * 1.1) + '%, ' + l + '%, ' + alpha.toFixed(3) + ')';
        for (var s = 0; s < TREE_SEGS; s++) drawTreeSeg(ctx, pts[s], pts[s + 1], style, tr.width, ax, ay, w, h);
      }
    }

    // Front layer: the nearest trees, drawn OVER the ribbons. Darker silhouettes,
    // strongest near the bottom (the foreground) and fading upward, so the path
    // appears to run between and behind them. Also cleared from the corridor.
    function drawTreesFront(ctx, w, h, t, ax, ay) {
      for (var i = 0; i < trees.length; i++) {
        var tr = trees[i];
        if (tr.z <= FRONT_Z) continue;
        var pts = treePoints(tr, w, h, t);
        var midY = h * (0.3 + tr.seedY * 0.4);
        var c = color.getCellColor(tr.x, midY, w, h);
        var l = Math.min(38, c.l * 0.42);                 // darker, silhouette-like
        var hue = c.h + tr.hueJ, sat = Math.min(50, c.s * 1.05), width = tr.width * 1.5;
        for (var s = 0; s < TREE_SEGS; s++) {
          var yN = (s + 0.5) / TREE_SEGS;
          var ramp = 0.20 + 0.80 * Math.pow(yN, 1.4);     // strongest at the bottom
          var alpha = (0.32 + 0.45 * tr.z) * ramp;
          var style = 'hsla(' + hue + ', ' + sat + '%, ' + l + '%, ' + alpha.toFixed(3) + ')';
          drawTreeSeg(ctx, pts[s], pts[s + 1], style, width, ax, ay, w, h);
        }
      }
    }

    // ---- the two converging ribbons ----
    var RPTS = 64;
    var apexFrac = { x: 0.5, y: 0.40 }; // shared destination, ~60% up (mid-screen)

    // Centre-line x of a ribbon at parameter t (0 = apex, 1 = just past bottom).
    // side = -1 (left) / +1 (right). Shared breath + wavePhase -> the two ribbons
    // move in sync; left x < right x, so [leftX, rightX] is the cleared corridor.
    function ribbonX(side, t, ax, w) {
      var topHalf = w * 0.012;                            // near each other at the apex
      var botHalf = w * 0.205 * (1 + breath * 0.06);      // wide at the bottom, gap breathes
      var swayMax = w * 0.055, waveAmp = w * 0.02;
      var widen = Math.pow(t, 1.25);                      // splay accelerates downward
      var halfGap = topHalf + (botHalf - topHalf) * widen;
      var damp = Math.sin(Math.PI * t);                   // anchored at apex & roots
      var sway = swayMax * breath * damp;                 // shared -> both lean together
      var wave = waveAmp * Math.sin(t * 1.6 * Math.PI * 2 + wavePhase) * damp;
      return ax + side * halfGap + sway + wave;
    }

    function ribbonCenter(side, w, h, ax, ay) {
      var pts = [];
      for (var i = 0; i < RPTS; i++) {
        var t = i / (RPTS - 1);
        var y = ay + (h * 1.06 - ay) * t;                 // apex -> just past the bottom
        pts.push({ x: ribbonX(side, t, ax, w), y: y, t: t });
      }
      return pts;
    }

    // True when (x,y) lies in the funnel between the two ribbons (below the apex),
    // so the forest can be cleared from between the lines.
    function inCorridor(x, y, ax, ay, w, h) {
      if (y <= ay) return false;
      var t = (y - ay) / (h * 1.06 - ay);
      if (t > 1) t = 1;
      return x > ribbonX(-1, t, ax, w) && x < ribbonX(1, t, ax, w);
    }

    function ribbonWidth(t) {                             // thin (far apex) -> thick (near)
      var top = minDim * 0.0035, bot = minDim * 0.021;
      return top + (bot - top) * Math.pow(t, 0.8);
    }

    function drawRibbon(ctx, center, w, h) {
      var n = center.length, left = [], right = [];
      for (var i = 0; i < n; i++) {
        var p = center[i];
        var a = center[Math.max(0, i - 1)], b = center[Math.min(n - 1, i + 1)];
        var dx = b.x - a.x, dy = b.y - a.y, len = Math.hypot(dx, dy) || 1;
        var nx = -dy / len, ny = dx / len, hw = ribbonWidth(p.t) * 0.5;
        left.push({ x: p.x + nx * hw, y: p.y + ny * hw });
        right.push({ x: p.x - nx * hw, y: p.y - ny * hw });
      }
      // Segmented fill: each quad takes its local earthy color pulled toward
      // forest green and darkened, so the trunk's color flows far -> near.
      for (i = 0; i < n - 1; i++) {
        var mx = (center[i].x + center[i + 1].x) * 0.5, my = (center[i].y + center[i + 1].y) * 0.5;
        var c = color.getCellColor(mx, my, w, h);
        var hue = c.h + (116 - c.h) * 0.5;                // pull halfway to forest green
        var quad = [left[i], left[i + 1], right[i + 1], right[i]];
        App.fillPolygon(ctx, quad, 'hsl(' + hue + ', ' + (c.s * 0.95) + '%, ' + (c.l * 0.5) + '%)');
      }
      App.strokePolyline(ctx, left, outline, outlineWidth);
      App.strokePolyline(ctx, right, outline, outlineWidth);
    }

    // ---- apex marker: a dim burgundy glow at the convergence point, crowned by
    // three large, very thin gold half-rings with short pendant lines. ----
    function drawGlow(ctx, ax, ay, w, h) {
      var pulse = 0.5 + 0.5 * breath;
      var R = minDim * (0.09 + 0.025 * pulse);
      var rings = 5;
      for (var i = rings; i >= 1; i--) {
        var f = i / rings;
        var alpha = (0.06 * (1 - f) + 0.015) * (0.6 + 0.4 * pulse); // dimmer than before
        App.fillCircle(ctx, ax, ay, R * f, 'hsla(345, 50%, 30%, ' + alpha.toFixed(3) + ')'); // burgundy
      }
    }

    // Three large, very thin gold half-rings centred on the apex, flat (diameter)
    // side level with it (upper semicircles), each with short pendant lines that
    // hang straight down — longest over the crown, vanishing at the flat ends.
    function drawArcs(ctx, ax, ay, w, h) {
      var GOLD = 'rgba(201, 170, 96, 0.6)';
      var maxR = Math.min(ay * 0.96, minDim * 0.62);
      var radii = [maxR * 0.55, maxR * 0.77, maxR];
      var segs = 48, nP = 13;
      for (var r = 0; r < radii.length; r++) {
        var R = radii[r], arc = [];
        for (var i = 0; i <= segs; i++) {
          var a = Math.PI + Math.PI * (i / segs);         // upper half
          arc.push({ x: ax + R * Math.cos(a), y: ay + R * Math.sin(a) });
        }
        App.strokePolyline(ctx, arc, GOLD, 1);            // very thin
        for (var p = 1; p < nP; p++) {                    // short pendant lines going down
          var a2 = Math.PI + Math.PI * (p / nP);
          var px = ax + R * Math.cos(a2), py = ay + R * Math.sin(a2);
          var len = minDim * 0.045 * Math.pow(Math.sin(Math.PI * p / nP), 0.8);
          if (len < 1) continue;
          App.strokePolyline(ctx, [{ x: px, y: py }, { x: px, y: py + len }], GOLD, 1);
        }
      }
    }

    // ---- lifecycle ----
    function rebuild(w, h) {
      W = w; H = h; minDim = Math.min(w, h);
      buildTrees(w, h);
      builtW = w; builtH = h;
    }
    function init(w, h) { rebuild(w, h); }

    function update(w, h, t, dt) {
      if (Math.abs(w - builtW) > 2 || Math.abs(h - builtH) > 2) rebuild(w, h);
      var effDt = dt * GLOBAL_SPEED;
      animTime += effDt;
      var ts = animTime / 1000;
      var m = motion.sample(animTime);
      breath = breathAt(ts);
      wavePhase += (effDt / 1000) * (0.10 + 0.25 * m.u); // slow travelling wander
      color.tick(w, h);
    }

    function render(ctx, w, h, env) {
      App.clear(ctx, w, h, env.background);
      W = w; H = h; minDim = Math.min(w, h);
      var t = animTime / 1000;
      var ax = w * apexFrac.x + breath * w * 0.02;        // destination drifts a touch
      var ay = h * apexFrac.y;

      drawTreesBack(ctx, w, h, t, ax, ay);
      drawGlow(ctx, ax, ay, w, h);
      drawRibbon(ctx, ribbonCenter(-1, w, h, ax, ay), w, h);
      drawRibbon(ctx, ribbonCenter(1, w, h, ax, ay), w, h);
      drawTreesFront(ctx, w, h, t, ax, ay);               // nearest trees in front, near the bottom
      drawArcs(ctx, ax, ay, w, h);                         // gold half-rings crowning the apex
    }

    return { init: init, update: update, render: render };
  };
})(window.App = window.App || {});

/* ===== src/main.js ===== */
// Entry point: wires the shared core to a chosen mode and runs the loop.
// The build bakes in a specific mode per Wallpaper Engine wallpaper; each
// build only bundles the sources for its own mode, so unused registry entries
// below are simply never invoked.
(function (App) {
  var MODES = {
    'stained-glass': {
      background: '#0a0a0a',
      create: function () {
        var color = App.createColorEngine(App.palettes.stainedGlass);
        return { color: color, mode: App.createStainedGlass({ color: color }) };
      }
    },
    // Art Nouveau "Organic" (v2) — src/modes/art-nouveau.js.
    'art-nouveau-organic': {
      background: '#12100c',
      create: function () {
        var color = App.createColorEngine(App.palettes.artNouveau);
        var motion = App.createMotion();
        return {
          color: color,
          mode: App.createArtNouveau({ color: color, motion: motion, palette: App.palettes.artNouveau })
        };
      }
    },
    // Art Nouveau "Sparse" (v1, frozen) — src/modes/art-nouveau-v1.js.
    'art-nouveau-sparse': {
      background: '#12100c',
      create: function () {
        var color = App.createColorEngine(App.palettes.artNouveauV1);
        var motion = App.createMotion();
        return {
          color: color,
          mode: App.createArtNouveauV1({ color: color, motion: motion, palette: App.palettes.artNouveauV1 })
        };
      }
    },
    // Heartwood — two converging ribbons (path/trunks) over a dancing forest.
    'heartwood': {
      background: '#25272b',
      create: function () {
        var color = App.createColorEngine(App.palettes.heartwood);
        var motion = App.createMotion();
        return {
          color: color,
          mode: App.createHeartwood({ color: color, motion: motion, palette: App.palettes.heartwood })
        };
      }
    }
  };

  App.start = function (modeName) {
    var def = MODES[modeName];
    if (!def) throw new Error('Unknown mode: ' + modeName);

    var view;
    var settings = App.createSettings({ background: def.background }, function (s) {
      if (view) view.setBackground(s.background);
    });

    view = App.createCanvas({ mount: '#root', background: settings.background });

    var built = def.create();
    var color = built.color, mode = built.mode;

    mode.init(view.width, view.height);

    App.createLoop(function (dt, t) {
      var w = view.width, h = view.height;
      mode.update(w, h, t, dt);
      mode.render(view.ctx, w, h, { background: settings.background });
      color.tick(w, h);
    }).start();
  };
})(window.App = window.App || {});

    App.start('heartwood');
  </script>
