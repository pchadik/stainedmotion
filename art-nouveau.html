<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Nouveau</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
/* ===== src/core/canvas.js ===== */
// Full-screen canvas bootstrap shared by every mode.
(function (App) {
  App.createCanvas = function (opts) {
    opts = opts || {};
    var canvas = document.createElement('canvas');
    var s = canvas.style;
    s.position = 'fixed';
    s.top = '0';
    s.left = '0';
    s.width = '100%';
    s.height = '100%';
    s.background = opts.background || '#0a0a0a';
    s.cursor = 'none';

    var mount = opts.mount ? document.querySelector(opts.mount) : null;
    (mount || document.body).appendChild(canvas);

    var ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    return {
      canvas: canvas,
      ctx: ctx,
      get width() { return canvas.width; },
      get height() { return canvas.height; },
      setBackground: function (c) { s.background = c; },
      destroy: function () {
        window.removeEventListener('resize', resize);
        if (canvas.parentNode) canvas.parentNode.removeChild(canvas);
      }
    };
  };
})(window.App = window.App || {});

/* ===== src/core/loop.js ===== */
// requestAnimationFrame loop with start/stop. Passes (dt, time) in ms.
(function (App) {
  App.createLoop = function (fn) {
    var raf = null;
    var last = 0;
    var running = false;

    function frame(t) {
      if (!running) return;
      var dt = last ? t - last : 16.7;
      last = t;
      fn(dt, t);
      raf = requestAnimationFrame(frame);
    }

    return {
      start: function () {
        if (running) return;
        running = true;
        last = 0;
        raf = requestAnimationFrame(frame);
      },
      stop: function () {
        running = false;
        if (raf) cancelAnimationFrame(raf);
      }
    };
  };
})(window.App = window.App || {});

/* ===== src/core/weprops.js ===== */
// Wallpaper Engine user-property plumbing, with sane fallbacks when run
// outside WE (e.g. the GitHub Pages demo, where the listener never fires).
(function (App) {
  // WE sends colors as space-separated floats in 0..1, e.g. "0.04 0.04 0.04".
  function weColorToCss(v) {
    var parts = String(v).split(' ').map(parseFloat);
    if (parts.length < 3 || parts.some(isNaN)) return null;
    return 'rgb(' + Math.round(parts[0] * 255) + ',' +
                    Math.round(parts[1] * 255) + ',' +
                    Math.round(parts[2] * 255) + ')';
  }

  App.createSettings = function (defaults, onChange) {
    var settings = Object.assign({}, defaults);

    window.wallpaperPropertyListener = {
      applyUserProperties: function (props) {
        if (props.schemecolor && props.schemecolor.value != null) {
          var css = weColorToCss(props.schemecolor.value);
          if (css) settings.background = css;
        }
        if (onChange) onChange(settings);
      }
    };

    return settings;
  };
})(window.App = window.App || {});

/* ===== src/core/paint.js ===== */
// Low-level drawing helpers shared by the renderers.
(function (App) {
  App.clear = function (ctx, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(0, 0, w, h);
  };

  function tracePath(ctx, pts) {
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (var i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
  }

  App.fillPolygon = function (ctx, pts, fillStyle) {
    ctx.fillStyle = fillStyle;
    tracePath(ctx, pts);
    ctx.fill();
  };

  // Cloisonné-style outline around a closed polygon.
  App.strokePolygon = function (ctx, pts, strokeStyle, width) {
    ctx.strokeStyle = strokeStyle;
    ctx.lineWidth = width;
    ctx.lineJoin = 'round';
    tracePath(ctx, pts);
    ctx.stroke();
  };
})(window.App = window.App || {});

/* ===== src/core/color.js ===== */
// Harmonic color engine: a slowly drifting root hue, harmony palettes that
// cross-fade when they switch, and smooth (non-quantized) hue interpolation so
// cells never flip abruptly. Driven entirely by a palette config so each mode
// can supply its own harmonies and saturation/lightness ranges.
(function (App) {
  App.createColorEngine = function (palette) {
    var p = palette;
    var harmonyNames = Object.keys(p.harmonies);

    var rootHue = Math.random() * 360;
    var harmonyType = 0;
    var prevHarmony = 0;
    var harmonyMix = 1; // 1 = fully on current harmony, <1 = mid cross-fade

    // Interpolate between two hues along the shortest angular path.
    function lerpHue(a, b, t) {
      var d = ((b - a + 540) % 360) - 180;
      return (a + d * t + 360) % 360;
    }

    function harmonicHueFor(harmony, cx, cy, w, h) {
      var blend = (Math.sin(cx / w * Math.PI * p.blendFreqX) +
                   Math.sin(cy / h * Math.PI * p.blendFreqY)) / 2;
      // Continuous position within the palette (no hard quantization step).
      var pos = (blend + 1) / 2 * harmony.length;
      var i0 = Math.floor(pos) % harmony.length;
      var i1 = (i0 + 1) % harmony.length;
      var frac = pos - Math.floor(pos);
      var h0 = (rootHue + harmony[i0] + 360) % 360;
      var h1 = (rootHue + harmony[i1] + 360) % 360;
      return lerpHue(h0, h1, frac);
    }

    function getHarmonicHue(cx, cy, w, h) {
      var toHue = harmonicHueFor(p.harmonies[harmonyNames[harmonyType]], cx, cy, w, h);
      if (harmonyMix >= 1) return toHue;
      // Cross-fade from the previous harmony so a switch sweeps in smoothly.
      var fromHue = harmonicHueFor(p.harmonies[harmonyNames[prevHarmony]], cx, cy, w, h);
      return lerpHue(fromHue, toHue, harmonyMix);
    }

    function hueToColor(hue, cx, cy, w, h) {
      var sVal = Math.sin(cx / w * Math.PI * p.satFreqX + cy / h * Math.PI * p.satFreqY);
      var lVal = Math.sin(cx / w * Math.PI * p.lightFreqX + cy / h * Math.PI * p.lightFreqY);
      return { h: hue, s: p.satBase + sVal * p.satAmp, l: p.lightBase + lVal * p.lightAmp };
    }

    function colorToHsl(c) {
      return 'hsl(' + c.h + ', ' + c.s + '%, ' + c.l + '%)';
    }

    function getCellColor(cx, cy, w, h) {
      var x = Math.max(0, Math.min(w, cx));
      var y = Math.max(0, Math.min(h, cy));
      return hueToColor(getHarmonicHue(x, y, w, h), x, y, w, h);
    }

    // Advance the slow hue drift and any in-progress harmony cross-fade.
    function tick() {
      rootHue = (rootHue + p.hueDrift) % 360;
      if (harmonyMix < 1) {
        harmonyMix = Math.min(1, harmonyMix + p.crossfadeStep);
      } else if (Math.random() < p.harmonySwitchProb) {
        prevHarmony = harmonyType;
        harmonyType = (harmonyType + 1) % harmonyNames.length;
        harmonyMix = 0;
      }
    }

    return {
      getCellColor: getCellColor,
      colorToHsl: colorToHsl,
      tick: tick
    };
  };
})(window.App = window.App || {});

/* ===== src/core/motion.js ===== */
// Three independent motion axes, each a value in [0,1] that drifts on its own
// incommensurate cycle so the scene keeps recomposing instead of looping:
//   u - undulation (flow-field breathing)
//   r - rotation   (roundels / polar mosaic spin)
//   p - particles  (motes advecting along the streamlines)
// A soft floor on combined energy keeps it from ever going fully still.
// Master intensity and per-axis enable/cap hooks back the future WE properties.
(function (App) {
  App.createMotion = function (config) {
    config = config || {};
    var intensity = config.intensity != null ? config.intensity : 1;
    var enabled = Object.assign({ u: true, r: true, p: true }, config.enabled);
    var cap = Object.assign({ u: 1, r: 1, p: 1 }, config.cap);
    var minEnergy = config.minEnergy != null ? config.minEnergy : 0.6;

    // Each axis blends two sine components at incommensurate periods (seconds).
    // Randomized phase offsets make every run start differently.
    function axis(p1, p2) {
      return {
        w1: 2 * Math.PI / p1,
        w2: 2 * Math.PI / p2,
        o1: Math.random() * Math.PI * 2,
        o2: Math.random() * Math.PI * 2
      };
    }
    var defs = {
      u: axis(41, 17),
      r: axis(53, 23),
      p: axis(67, 29)
    };

    // Amplitudes 0.7 + 0.3 keep the result within [0,1].
    function raw(a, ts) {
      return 0.5 + 0.5 * (0.7 * Math.sin(a.w1 * ts + a.o1) + 0.3 * Math.sin(a.w2 * ts + a.o2));
    }

    var values = { u: 0, r: 0, p: 0 };

    function sample(timeMs) {
      var ts = timeMs / 1000;
      var u = raw(defs.u, ts);
      var r = raw(defs.r, ts);
      var p = raw(defs.p, ts);

      // Soft floor on combined energy so the scene never flatlines.
      var energy = u + r + p;
      if (energy < minEnergy) {
        var lift = (minEnergy - energy) / 3;
        u = Math.min(1, u + lift);
        r = Math.min(1, r + lift);
        p = Math.min(1, p + lift);
      }

      // Per-axis enable/cap and master intensity (a user override that can
      // suppress motion entirely, applied after the natural floor).
      values.u = (enabled.u ? cap.u : 0) * intensity * u;
      values.r = (enabled.r ? cap.r : 0) * intensity * r;
      values.p = (enabled.p ? cap.p : 0) * intensity * p;
      return values;
    }

    return {
      sample: sample,
      values: values,
      setIntensity: function (v) { intensity = v; },
      setEnabled: function (axisKey, on) { enabled[axisKey] = on; },
      setCap: function (axisKey, v) { cap[axisKey] = v; }
    };
  };
})(window.App = window.App || {});

/* ===== src/palettes/art-nouveau.js ===== */
// Art Nouveau / Mucha palette: muted, pastel, lower saturation and higher
// lightness than stained glass, for the soft drapery-and-gold feel. The hue
// drift still cycles slowly; biasing toward Mucha's sage/rose/gold/teal band is
// a later tuning knob.
(function (App) {
  App.palettes = App.palettes || {};
  App.palettes.artNouveau = {
    harmonies: {
      analogous: [0, 25, -25, 40, -40],
      triadic: [0, 120, 240],
      splitComplementary: [0, 150, 210],
      tetradic: [0, 90, 180, 270],
      complementary: [0, 160, 40, 200]
    },
    satBase: 30, satAmp: 10,
    lightBase: 55, lightAmp: 12,
    blendFreqX: 1.5, blendFreqY: 2,
    satFreqX: 1.2, satFreqY: 0.8,
    lightFreqX: 0.9, lightFreqY: 1.3,
    hueDrift: 0.004,
    harmonySwitchProb: 0.00004,
    crossfadeStep: 0.008,
    // Cloisonné outline (gold) — Mucha's contour lines.
    outline: '#b89a5e',
    outlineWidth: 1.6
  };
})(window.App = window.App || {});

/* ===== src/modes/art-nouveau.js ===== */
// Art Nouveau mode — STAGE 2: flowing ribbons + roundels / polar mosaic.
//
// Ribbons: whiplash curves traced as streamlines through a smooth flow field,
// drawn as tapered ribbons filled with muted harmonic color and gold-outlined
// (cloisonné). The field phase advances with motion axis u (undulation). Each
// ribbon keeps inertia and eases toward its freshly traced path, so a sudden
// streamline swing glides instead of whipping.
//
// Roundels: concentric polar mosaics (Mucha's halo motif) drawn behind the
// ribbons to anchor the composition and fill open space. Their rings rotate
// (alternating direction) with motion axis r.
//
// Motes (axis p) arrive in a later stage.
(function (App) {
  App.createArtNouveau = function (deps) {
    var color = deps.color;
    var motion = deps.motion;
    var palette = deps.palette || {};
    var outline = palette.outline || '#b89a5e';
    var outlineWidth = palette.outlineWidth || 1.6;

    var ribbons = [];
    var roundels = [];
    var W = 1, H = 1;
    var fieldPhase = 0;
    var SMOOTH_TAU = 280; // ms; ribbon inertia time constant

    // Fixed per-run field constants so every run flows differently.
    var P1 = Math.random() * Math.PI * 2;
    var P2 = Math.random() * Math.PI * 2;
    var P3 = Math.random() * Math.PI * 2;
    var FA = 2.6 + Math.random() * 0.8;
    var FB = 2.6 + Math.random() * 0.8;
    var FC = 3.8 + Math.random() * 0.8;

    // Smooth direction field over normalized coordinates; phase animates it.
    function fieldAngle(x, y) {
      var nx = x / W, ny = y / H;
      return Math.PI * (
        Math.sin(nx * FA + fieldPhase * 0.7 + P1) +
        Math.sin(ny * FB + fieldPhase * 1.0 + P2) +
        0.5 * Math.sin((nx + ny) * FC + fieldPhase * 1.3 + P3)
      );
    }

    function traceInto(rb, dst) {
      var x = rb.sx, y = rb.sy;
      for (var i = 0; i < rb.steps; i++) {
        if (!dst[i]) dst[i] = { x: x, y: y };
        else { dst[i].x = x; dst[i].y = y; }
        var a = fieldAngle(x, y);
        x += Math.cos(a) * rb.ds;
        y += Math.sin(a) * rb.ds;
      }
      return dst;
    }

    // ---- roundels ----
    function makeRoundel(cx, cy, R) {
      var bandDefs = [
        { rIn: 0.18, rOut: 0.45, sectors: 12, rate: 0.12 },
        { rIn: 0.45, rOut: 0.72, sectors: 18, rate: -0.09 },
        { rIn: 0.72, rOut: 0.95, sectors: 24, rate: 0.07 }
      ];
      var bands = bandDefs.map(function (b) {
        return {
          rIn: R * b.rIn, rOut: R * b.rOut, sectors: b.sectors,
          rate: b.rate, phase: Math.random() * Math.PI * 2
        };
      });
      return { cx: cx, cy: cy, R: R, disc: R * 0.18, bands: bands };
    }

    function buildRoundels(w, h) {
      var minDim = Math.min(w, h);
      return [
        makeRoundel(w * 0.66, h * 0.40, minDim * 0.34),
        makeRoundel(w * 0.20, h * 0.74, minDim * 0.18)
      ];
    }

    function arcPoints(cx, cy, r, a0, a1, segs, out) {
      for (var i = 0; i <= segs; i++) {
        var a = a0 + (a1 - a0) * i / segs;
        out.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
      }
    }

    function annularSector(cx, cy, rIn, rOut, a0, a1) {
      var segs = Math.max(2, Math.ceil((a1 - a0) / 0.25));
      var pts = [];
      arcPoints(cx, cy, rOut, a0, a1, segs, pts);
      // inner arc back (reverse direction)
      for (var i = segs; i >= 0; i--) {
        var a = a0 + (a1 - a0) * i / segs;
        pts.push({ x: cx + rIn * Math.cos(a), y: cy + rIn * Math.sin(a) });
      }
      return pts;
    }

    function circlePoly(cx, cy, r) {
      var pts = [];
      arcPoints(cx, cy, r, 0, Math.PI * 2, 48, pts);
      return pts;
    }

    function drawRoundel(ctx, rd, w, h) {
      // inner solid disc
      var disc = circlePoly(rd.cx, rd.cy, rd.disc);
      App.fillPolygon(ctx, disc, color.colorToHsl(color.getCellColor(rd.cx, rd.cy, w, h)));
      App.strokePolygon(ctx, disc, outline, outlineWidth);

      // mosaic bands
      for (var bi = 0; bi < rd.bands.length; bi++) {
        var band = rd.bands[bi];
        var step = Math.PI * 2 / band.sectors;
        var midR = (band.rIn + band.rOut) * 0.5;
        for (var k = 0; k < band.sectors; k++) {
          var a0 = band.phase + k * step;
          var a1 = a0 + step;
          var poly = annularSector(rd.cx, rd.cy, band.rIn, band.rOut, a0, a1);
          var midA = a0 + step * 0.5;
          var mx = rd.cx + midR * Math.cos(midA);
          var my = rd.cy + midR * Math.sin(midA);
          App.fillPolygon(ctx, poly, color.colorToHsl(color.getCellColor(mx, my, w, h)));
          App.strokePolygon(ctx, poly, outline, outlineWidth);
        }
      }
      // outer rim
      App.strokePolygon(ctx, circlePoly(rd.cx, rd.cy, rd.R * 0.97), outline, outlineWidth * 1.4);
    }

    // ---- ribbons ----
    function init(w, h) {
      W = w; H = h;
      ribbons = [];
      var cols = 4, rows = 4;
      var minDim = Math.min(w, h);
      for (var i = 0; i < cols * rows; i++) {
        var c = i % cols, r = Math.floor(i / cols);
        var rb = {
          sx: (c + 0.5) / cols * w + (Math.random() - 0.5) * (w / cols) * 0.6,
          sy: (r + 0.5) / rows * h + (Math.random() - 0.5) * (h / rows) * 0.6,
          steps: 70 + Math.floor(Math.random() * 60),
          ds: minDim * (0.008 + Math.random() * 0.006),
          width: minDim * (0.012 + Math.random() * 0.02),
          pts: []
        };
        traceInto(rb, rb.pts); // start settled on the field (no startup ease)
        ribbons.push(rb);
      }
      roundels = buildRoundels(w, h);
    }

    var scratch = [];
    function ribbonPolygon(pts, maxWidth) {
      var n = pts.length;
      var left = [], right = [];
      for (var i = 0; i < n; i++) {
        var p = pts[i];
        var a = pts[Math.max(0, i - 1)];
        var b = pts[Math.min(n - 1, i + 1)];
        var dx = b.x - a.x, dy = b.y - a.y;
        var len = Math.hypot(dx, dy) || 1;
        var nxp = -dy / len, nyp = dx / len;
        // Clamp the sine: at i = n-1, Math.PI*i/(n-1) can exceed PI by one ULP,
        // making sin slightly negative and Math.pow(negative, 0.7) => NaN.
        var s = Math.sin(Math.PI * i / (n - 1));
        var taper = Math.pow(s > 0 ? s : 0, 0.7);
        var hw = maxWidth * taper * 0.5;
        left.push({ x: p.x + nxp * hw, y: p.y + nyp * hw });
        right.push({ x: p.x - nxp * hw, y: p.y - nyp * hw });
      }
      return left.concat(right.reverse());
    }

    function update(w, h, t, dt) {
      W = w; H = h;
      var m = motion.sample(t);

      // Undulation drives how fast the field morphs (gentle, with a floor).
      fieldPhase += (dt / 1000) * (0.025 + 0.18 * m.u);

      // Ease each ribbon toward its freshly traced path (inertia damps whips).
      var alpha = 1 - Math.exp(-dt / SMOOTH_TAU);
      for (var i = 0; i < ribbons.length; i++) {
        var rb = ribbons[i];
        traceInto(rb, scratch);
        for (var j = 0; j < rb.steps; j++) {
          rb.pts[j].x += (scratch[j].x - rb.pts[j].x) * alpha;
          rb.pts[j].y += (scratch[j].y - rb.pts[j].y) * alpha;
        }
      }

      // Rotate roundel rings with axis r (alternating direction per band).
      var rSpin = 0.15 + 0.85 * m.r;
      for (var ri = 0; ri < roundels.length; ri++) {
        var bands = roundels[ri].bands;
        for (var bi = 0; bi < bands.length; bi++) {
          bands[bi].phase += (dt / 1000) * bands[bi].rate * rSpin;
        }
      }
    }

    function render(ctx, w, h, env) {
      App.clear(ctx, w, h, env.background);
      W = w; H = h;

      // Roundels behind, ribbons in front (Mucha figure-over-halo depth).
      for (var ri = 0; ri < roundels.length; ri++) drawRoundel(ctx, roundels[ri], w, h);

      for (var i = 0; i < ribbons.length; i++) {
        var rb = ribbons[i];
        var poly = ribbonPolygon(rb.pts, rb.width);
        var mid = rb.pts[Math.floor(rb.pts.length / 2)];
        var col = color.getCellColor(mid.x, mid.y, w, h);
        App.fillPolygon(ctx, poly, color.colorToHsl(col));
        App.strokePolygon(ctx, poly, outline, outlineWidth);
      }
    }

    return { init: init, update: update, render: render };
  };
})(window.App = window.App || {});

/* ===== src/main.js ===== */
// Entry point: wires the shared core to a chosen mode and runs the loop.
// The build bakes in a specific mode per Wallpaper Engine wallpaper; each
// build only bundles the sources for its own mode, so unused registry entries
// below are simply never invoked.
(function (App) {
  var MODES = {
    'stained-glass': {
      background: '#0a0a0a',
      create: function () {
        var color = App.createColorEngine(App.palettes.stainedGlass);
        return { color: color, mode: App.createStainedGlass({ color: color }) };
      }
    },
    'art-nouveau': {
      background: '#12100c',
      create: function () {
        var color = App.createColorEngine(App.palettes.artNouveau);
        var motion = App.createMotion();
        return {
          color: color,
          mode: App.createArtNouveau({ color: color, motion: motion, palette: App.palettes.artNouveau })
        };
      }
    }
  };

  App.start = function (modeName) {
    var def = MODES[modeName];
    if (!def) throw new Error('Unknown mode: ' + modeName);

    var view;
    var settings = App.createSettings({ background: def.background }, function (s) {
      if (view) view.setBackground(s.background);
    });

    view = App.createCanvas({ mount: '#root', background: settings.background });

    var built = def.create();
    var color = built.color, mode = built.mode;

    mode.init(view.width, view.height);

    App.createLoop(function (dt, t) {
      var w = view.width, h = view.height;
      mode.update(w, h, t, dt);
      mode.render(view.ctx, w, h, { background: settings.background });
      color.tick(w, h);
    }).start();
  };
})(window.App = window.App || {});

    App.start('art-nouveau');
  </script>
</body>
</html>
